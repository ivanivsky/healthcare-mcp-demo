# Docker Compose for local container testing before Cloud Run deployment
# Usage: docker-compose up --build

services:
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile.mcp-server
    container_name: health-advisor-mcp
    environment:
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8001
      - MCP_TRANSPORT=sse
      - DATABASE_PATH=/app/data/health_advisor.db
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: health-advisor-backend
    environment:
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8080
      - MCP_SERVER_URL=http://mcp-server:8001/sse
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    ports:
      - "8080:8080"
    depends_on:
      mcp-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

# Note: The frontend is served directly by the backend on port 8080
# Access the app at http://localhost:8080
