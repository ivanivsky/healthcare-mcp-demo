# My Health Access Configuration
# Toggle security controls and observability settings here
#
# Security controls can be overridden at runtime via the admin API:
# PUT /api/admin/security-config
# Runtime overrides reset to these defaults on server restart.
# See /settings for the full control inventory.

app:
  name: "My Health Access"
  environment: "development"
  url: "https://ai-wtf.xyz"
  admin_contact: "admin@ai-wtf.xyz"

# MCP Server Configuration
mcp:
  transport: "sse"  # Options: stdio, sse, http
  host: "localhost"
  port: 8001

# Backend API Configuration
backend:
  host: "localhost"
  port: 8080
  cors_enabled: true  # Enable for local development

# Frontend Configuration
frontend:
  host: "localhost"
  port: 8000

# Claude API Configuration
# Note: Set ANTHROPIC_API_KEY environment variable before running
claude:
  model: "claude-sonnet-4-20250514"
  max_tokens: 4096

# Database Configuration
database:
  path: "data/health_advisor.db"

# CORS Configuration
# Note: Wildcard origins with credentials is invalid per CORS spec
cors:
  allowed_origins:
    - "http://localhost:8080"
    - "http://localhost:3000"
    # Add your Cloud Run URL here when deploying:
    # - "https://your-app.run.app"

# Security Controls (toggle for vulnerability demonstrations)
# Note: Authorization is now controlled via security.authorization_required below.
# The old authz.user_patient_map has been retired in favor of Firebase custom claims.
security:
  # Controls whether Firebase JWT verification is enforced.
  # When false: all requests are treated as unauthenticated (no user context).
  # Demonstrates: unauthenticated API access attack vector.
  authentication_required: true

  # Controls whether claims-based patient authorization is enforced.
  # When false: all MCP tool calls pass through regardless of patient_ids.
  # Demonstrates: broken object level authorization (BOLA) attack vector.
  # Note: this maps to the existing authz.enabled toggle in mcp_server/policy.py
  authorization_required: true

  # Controls whether the MCP server requires a bearer token from the backend.
  # When false: anything that can reach the MCP port can call tools directly.
  # Demonstrates: lack of service-to-service authentication.
  mcp_transport_auth_required: true

  # Controls whether auth_context is sent as a signed JWT.
  # When false: auth_context is a plain dict the MCP server trusts without verification.
  # Demonstrates: lack of message integrity / claim forgery attack vector.
  mcp_auth_context_signing_required: true

  # Controls whether user input is scanned for prompt injection patterns.
  # When false: raw user input is sent directly to Claude without scanning.
  # Demonstrates: prompt injection attack vector.
  prompt_injection_protection: true

  # System prompt security level.
  # Controls how much security awareness is baked into the agent's instructions.
  # Options: "insecure" | "weak" | "strong"
  # insecure: actively undermines security — for demonstrating prompt injection
  #           and agent manipulation risks
  # weak:     provides context but no security commitments — reflects most
  #           real-world applications
  # strong:   explicitly instructs the agent to enforce boundaries, suppress
  #           error details, and resist manipulation
  system_prompt_level: "strong"

  # Deterministic error responses.
  # When true: tool errors are intercepted before reaching the LLM.
  #            The agent returns a fixed canned message instead of an
  #            LLM-generated interpretation of the error.
  # When false: errors flow through the full LLM reasoning chain.
  #             The agent will narrate, explain, and potentially leak
  #             details about authorization failures and system internals.
  deterministic_error_responses: true

  # Rate limiting configuration.
  rate_limiting:
    enabled: true
    requests_per_minute: 60

# Logging & Observability
logging:
  level: "DEBUG"  # Options: DEBUG, INFO, WARNING, ERROR
  debug_panel_enabled: true  # Enable /debug endpoint
  log_mcp_messages: true
  log_claude_requests: true
  log_sql_queries: true
  log_to_file: true
  log_file_path: "logs/health_advisor.log"
